# Port na kojem aplikacija sluša (Render automatski dodjeljuje svoj PORT, lokalno je 8080)
server.port=${PORT:8080}

# Pametna konfiguracija baze podataka (Automatski dodaje jdbc: na Renderov URL ili koristi localhost)
spring.datasource.url=jdbc:${DATABASE_URL:postgresql://localhost:5432/movebuddy}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate postavke
# 'update' automatski kreira sve tablice u bazi prilikom prvog pokretanja (spas za praznu Render bazu)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Ovdje NE pišeš ključ, nego samo referencu
JWT_SECRET_KEY=${JWT_SECRET_KEY}